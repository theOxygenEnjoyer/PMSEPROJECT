<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Create New Tour Package | Jom Teroka</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-background text-on-surface font-body-md flex flex-col min-h-screen"
  >
    <nav
      class="bg-white border-b border-outline-variant/30 h-20 flex items-center shadow-sm"
    >
      <div
        class="flex justify-between items-center w-full px-margin-desktop max-w-container-max mx-auto"
      >
        <div class="flex items-center gap-4">
          <a
            href="guideDashboard.html"
            class="material-symbols-outlined text-primary p-2 hover:bg-gray-100 rounded-full"
            >arrow_back</a
          >
          <h1 class="text-xl font-display font-bold text-primary">
            Create Package Form
          </h1>
        </div>
        <button
          onclick="toggleLanguage()"
          class="lang-switcher-btn font-bold text-primary px-4 py-2 border border-primary rounded-xl hover:bg-primary/5"
        >
          EN | BM
        </button>
      </div>
    </nav>

    <main class="flex-1 max-w-4xl w-full mx-auto px-margin-desktop py-12">
      <form
        onsubmit="saveCustomTourPackage(event)"
        class="bg-white rounded-3xl border border-outline-variant/40 shadow-xl p-8 space-y-6"
      >
        <div class="space-y-1.5">
          <label class="font-label-sm text-on-surface-variant"
            >Tour Package Title</label
          >
          <input
            type="text"
            id="pkg-title"
            required
            class="w-full h-12 px-4 rounded-xl border-outline-variant focus:border-primary focus:ring-primary"
            placeholder="e.g. Traditional Melaka Nyonya Trail"
          />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant"
              >Price (MYR)</label
            >
            <input
              type="number"
              id="pkg-price"
              required
              class="w-full h-12 px-4 rounded-xl border-outline-variant focus:border-primary focus:ring-primary"
              placeholder="120"
            />
          </div>
          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant"
              >Duration</label
            >
            <input
              type="text"
              id="pkg-duration"
              required
              class="w-full h-12 px-4 rounded-xl border-outline-variant focus:border-primary focus:ring-primary"
              placeholder="e.g. 4 Hours"
            />
          </div>
          <div class="space-y-1.5">
            <label class="font-label-sm text-on-surface-variant"
              >Max Capacity (Pax)</label
            >
            <input
              type="number"
              id="pkg-capacity"
              required
              class="w-full h-12 px-4 rounded-xl border-outline-variant focus:border-primary focus:ring-primary"
              placeholder="6"
            />
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="font-label-sm text-on-surface-variant"
            >Short Summary Description</label
          >
          <textarea
            id="pkg-desc"
            required
            class="w-full min-h-24 p-4 rounded-xl border-outline-variant focus:border-primary focus:ring-primary"
            placeholder="Provide a summary of what tourists will experience..."
          ></textarea>
        </div>

        <button
          type="submit"
          class="w-full h-12 bg-primary text-white rounded-xl font-bold hover:bg-primary-container shadow-md transition-all active:scale-98"
        >
          Publish Tour Package
        </button>
      </form>
    </main>

    <script>
      function toggleLanguage() {
        let currentLang = localStorage.getItem("selectedLang") || "en";
        let nextLang = currentLang === "en" ? "bm" : "en";
        localStorage.setItem("selectedLang", nextLang);
        location.reload();
      }

      function saveCustomTourPackage(event) {
        event.preventDefault();

        const title = document.getElementById("pkg-title").value;
        const price = document.getElementById("pkg-price").value;
        const duration = document.getElementById("pkg-duration").value;
        const capacity = document.getElementById("pkg-capacity").value;
        const desc = document.getElementById("pkg-desc").value;

        const newPackage = {
          title,
          price,
          duration,
          capacity,
          desc,
          dateCreated: new Date().toLocaleDateString(),
        };

        // Pull previous inputs array safely context state management
        const basePackages = JSON.parse(
          localStorage.getItem("customTourPackages") || "[]",
        );
        basePackages.push(newPackage);
        localStorage.setItem(
          "customTourPackages",
          JSON.stringify(basePackages),
        );

        alert(
          "Tour Package created and synchronized successfully! Heading to Inventory.",
        );
        window.location.href = "tourpackages.html";
      }

      document.addEventListener("DOMContentLoaded", () => {
        let savedLang = localStorage.getItem("selectedLang") || "en";
        document.querySelector(".lang-switcher-btn").innerText =
          savedLang === "en" ? "EN | BM" : "BM | EN";
      });
    </script>
  </body>
</html>
