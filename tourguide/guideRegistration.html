<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Jom Teroka | Become a Guide</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-background text-on-surface font-body-md flex flex-col justify-between min-h-screen p-4 md:p-8"
  >
    <header
      class="w-full max-w-6xl mx-auto flex justify-between items-center h-16 mb-6"
    >
      <a
        href="homepage.html"
        class="text-headline-md font-headline-md font-bold text-primary"
        data-i18n="brand"
        >Jom Teroka</a
      >
      <button
        onclick="toggleLanguage()"
        class="lang-switcher-btn text-primary font-bold border border-primary px-4 py-2 rounded-xl hover:bg-primary/5 transition-all"
      >
        EN | BM
      </button>
    </header>

    <main
      class="w-full max-w-3xl bg-white rounded-3xl shadow-xl border border-outline-variant/30 p-8 md:p-12 mx-auto my-auto"
    >
      <h1
        class="font-display-lg text-headline-lg md:text-display-lg text-primary mb-2"
        data-i18n="regTitle"
      >
        Become a Verified Guide
      </h1>
      <p
        class="text-on-surface-variant text-body-md mb-8"
        data-i18n="regSubtitle"
      >
        Share local stories, preserve heritage, and earn doing what you love.
      </p>

      <form onsubmit="handleRegistration(event)" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label
              class="font-label-sm text-on-surface-variant"
              data-i18n="labelFullName"
              >Full Name</label
            >
            <input
              type="text"
              required
              class="w-full h-12 px-4 rounded-xl border-outline-variant/60 focus:border-primary focus:ring-1 focus:ring-primary"
              placeholder="e.g. Ariff Rahman"
            />
          </div>
          <div class="space-y-1.5">
            <label
              class="font-label-sm text-on-surface-variant"
              data-i18n="labelEmail"
              >Email Address</label
            >
            <input
              type="email"
              required
              class="w-full h-12 px-4 rounded-xl border-outline-variant/60 focus:border-primary focus:ring-1 focus:ring-primary"
              placeholder="name@email.com"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label
              class="font-label-sm text-on-surface-variant"
              data-i18n="labelLicense"
              >Motac License No.</label
            >
            <input
              type="text"
              required
              class="w-full h-12 px-4 rounded-xl border-outline-variant/60 focus:border-primary focus:ring-1 focus:ring-primary"
              placeholder="TG-XXXXX"
            />
          </div>
          <div class="space-y-1.5">
            <label
              class="font-label-sm text-on-surface-variant"
              data-i18n="labelCity"
              >Base City</label
            >
            <input
              type="text"
              required
              class="w-full h-12 px-4 rounded-xl border-outline-variant/60 focus:border-primary focus:ring-1 focus:ring-primary"
              placeholder="e.g. Melaka"
            />
          </div>
        </div>

        <button
          type="submit"
          class="w-full h-12 bg-secondary-container hover:bg-secondary text-white font-headline-md rounded-xl shadow-md transition-all active:scale-98"
          data-i18n="btnSubmit"
        >
          Submit Application
        </button>
      </form>

      <p class="text-center text-sm text-on-surface-variant mt-8">
        <span data-i18n="hasAccount">Already have an account? </span>
        <a
          href="tourguidelogin.html"
          class="text-primary font-bold hover:underline"
          data-i18n="lnkLogin"
          >Log In Here</a
        >
      </p>
    </main>

    <footer class="py-6 mt-12 border-t border-outline-variant/20">
      <div
        class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-center"
      >
        <p class="text-label-sm text-on-surface-variant">
          © 2026 Jom Teroka. Malaysian Hospitality Redefined.
        </p>
      </div>
    </footer>

    <script>
      function handleRegistration(event) {
        event.preventDefault();
        alert(
          localStorage.getItem("selectedLang") === "bm"
            ? "Pendaftaran Berjaya! Sila log masuk."
            : "Registration Application Received! Redirecting to Login.",
        );
        window.location.href = "tourguidelogin.html";
      }

      const translations = {
        en: {
          brand: "Jom Teroka",
          regTitle: "Become a Verified Guide",
          regSubtitle:
            "Share local stories, preserve heritage, and earn doing what you love.",
          labelFullName: "Full Name",
          labelEmail: "Email Address",
          labelLicense: "Motac License No.",
          labelCity: "Base City",
          btnSubmit: "Submit Application",
          hasAccount: "Already have an account? ",
          lnkLogin: "Log In Here",
        },
        bm: {
          brand: "Jom Teroka",
          regTitle: "Menjadi Pemandu Pelancong Berlesen",
          regSubtitle:
            "Kongsi kisah tempatan, pelihara warisan, dan jana pendapatan melakukan perkara yang anda minati.",
          labelFullName: "Nama Penuh",
          labelEmail: "Alamat E-mel",
          labelLicense: "No. Lesen MOTAC",
          labelCity: "Bandar Operasi",
          btnSubmit: "Hantar Permohonan",
          hasAccount: "Sudah mempunyai akaun? ",
          lnkLogin: "Log Masuk Di Sini",
        },
      };

      function toggleLanguage() {
        let currentLang = localStorage.getItem("selectedLang") || "en";
        let nextLang = currentLang === "en" ? "bm" : "en";
        localStorage.setItem("selectedLang", nextLang);
        applyTranslations(nextLang);
      }

      function applyTranslations(lang) {
        const t = translations[lang];
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.getAttribute("data-i18n");
          if (t && t[key]) el.innerText = t[key];
        });
        document.querySelector(".lang-switcher-btn").innerText =
          lang === "en" ? "EN | BM" : "BM | EN";
      }

      document.addEventListener("DOMContentLoaded", () => {
        let savedLang = localStorage.getItem("selectedLang") || "en";
        applyTranslations(savedLang);
      });
    </script>
  </body>
</html>
