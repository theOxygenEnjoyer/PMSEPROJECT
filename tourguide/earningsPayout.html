<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Earnings & Payouts | Jom Teroka</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-background text-on-surface font-body-md flex flex-col min-h-screen"
  >
    <nav
      class="bg-white border-b border-outline-variant/30 h-20 flex items-center shadow-sm shrink-0 z-30"
    >
      <div
        class="flex justify-between items-center w-full px-margin-desktop max-w-container-max mx-auto"
      >
        <div class="flex items-center gap-4">
          <a
            href="guideDashboard.html"
            class="material-symbols-outlined text-primary p-2 hover:bg-gray-100 rounded-full"
            >arrow_back</a
          >
          <h1 class="text-xl font-display font-bold text-primary">
            Earnings & Payouts
          </h1>
        </div>
        <button
          onclick="toggleLanguage()"
          class="lang-switcher-btn font-bold text-primary px-4 py-2 border border-primary rounded-xl hover:bg-primary/5"
        >
          EN | BM
        </button>
      </div>
    </nav>

    <main
      class="flex-1 max-w-4xl w-full mx-auto px-margin-desktop py-12 space-y-6"
    >
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div
          class="bg-white border border-outline-variant/40 rounded-2xl p-6 shadow-sm"
        >
          <p
            class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1"
          >
            Withdrawable Balance
          </p>
          <h2 id="wallet-display-value" class="text-4xl font-bold text-primary">
            RM 3,600
          </h2>
        </div>
        <div
          class="bg-white border border-outline-variant/40 rounded-2xl p-6 shadow-sm"
        >
          <p
            class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1"
          >
            Pending Payouts
          </p>
          <h2
            id="pending-display-value"
            class="text-4xl font-bold text-on-surface-variant"
          >
            RM 680
          </h2>
        </div>
        <div
          class="bg-white border border-outline-variant/40 rounded-2xl p-6 shadow-sm"
        >
          <p
            class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1"
          >
            Platform Fees Paid
          </p>
          <h2 class="text-4xl font-bold text-error">RM 320</h2>
        </div>
      </div>

      <div
        class="bg-white border border-outline-variant/40 rounded-3xl p-8 shadow-sm flex flex-col items-center text-center max-w-md mx-auto"
      >
        <div
          class="w-16 h-16 rounded-full bg-secondary/10 text-secondary flex items-center justify-center mb-4"
        >
          <span class="material-symbols-outlined text-3xl"
            >account_balance</span
          >
        </div>
        <h3 class="font-headline-md font-bold text-primary mb-2">
          Transfer to Bank Account
        </h3>
        <p class="text-sm text-on-surface-variant mb-6">
          Disburse your available funds securely into your verified bank account
          link instantly.
        </p>
        <button
          id="payoutDisbursementBtn"
          onclick="executeWalletPayoutDisbursement()"
          class="w-full h-12 bg-secondary text-white font-bold rounded-xl shadow-lg hover:bg-secondary-container transition-all active:scale-95"
        >
          Request Payout Withdrawal
        </button>
      </div>
    </main>

    <script>
      function toggleLanguage() {
        let currentLang = localStorage.getItem("selectedLang") || "en";
        let nextLang = currentLang === "en" ? "bm" : "en";
        localStorage.setItem("selectedLang", nextLang);
        location.reload();
      }

      function executeWalletPayoutDisbursement() {
        const currentBalance = Number(
          localStorage.getItem("guideWalletBalance") || "3600",
        );
        if (currentBalance <= 0) {
          alert(
            "Your available withdrawable balance value context layer is empty!",
          );
          return;
        }

        const confirmWithdrawal = confirm(
          `Confirm processing withdrawal payout disbursement tracking for RM ${currentBalance.toLocaleString()}?`,
        );
        if (!confirmWithdrawal) return;

        const btn = document.getElementById("payoutDisbursementBtn");
        btn.disabled = true;
        btn.innerHTML = "Processing...";

        setTimeout(() => {
          // Telegraph updates back to database arrays variables context directly
          localStorage.setItem("guideWalletBalance", "0");
          document.getElementById("wallet-display-value").innerText = "RM 0";

          // Shift metrics data properties directly matching assignment criteria logic specs loop elements summary parameters
          document.getElementById("pending-display-value").innerText =
            `RM ${(680 + currentBalance).toLocaleString()}`;

          btn.innerHTML = "Success!";
          btn.className =
            "w-full h-12 bg-primary text-white font-bold rounded-xl shadow-lg cursor-not-allowed";
          alert(
            "Disbursement process initiated successfully! Balances shifted and synchronized cleanly across dashboard telemetry ports.",
          );
        }, 1200);
      }

      document.addEventListener("DOMContentLoaded", () => {
        let savedLang = localStorage.getItem("selectedLang") || "en";
        document.querySelector(".lang-switcher-btn").innerText =
          savedLang === "en" ? "EN | BM" : "BM | EN";

        // Pull active wallet states from local cache dynamically upon initialization routines loop triggers safely
        const currentBalance = Number(
          localStorage.getItem("guideWalletBalance") || "3600",
        );
        document.getElementById("wallet-display-value").innerText =
          `RM ${currentBalance.toLocaleString()}`;
        if (currentBalance === 0) {
          const btn = document.getElementById("payoutDisbursementBtn");
          btn.disabled = true;
          btn.innerHTML = "No Available Balance";
          btn.className =
            "w-full h-12 bg-gray-300 text-gray-500 font-bold rounded-xl cursor-not-allowed";
          document.getElementById("pending-display-value").innerText =
            "RM 4,280";
        }
      });
    </script>
  </body>
</html>
